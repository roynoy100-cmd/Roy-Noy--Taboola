    let existing = [];
    try { existing = JSON.parse(localStorage.getItem('pl_d') || '[]'); } catch(e) {}
    const existingIds = new Set(existing.map(d => d.id));
    const toAdd = selected.filter(d => !existingIds.has(d.id));
    const merged = [...existing, ...toAdd];
    localStorage.setItem('pl_d', JSON.stringify(merged));
    let projs = [];
    try { projs = JSON.parse(localStorage.getItem('pl_p') || '[]'); } catch(e) {}
    if (!projs.includes('משרדי טבולה')) { projs.push('משרדי טבולה'); localStorage.setItem('pl_p', JSON.stringify(projs)); }
    showToast('✅ ' + toAdd.length + ' ליקויים יובאו!');
    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
  } catch(e) {
    showToast('❌ שגיאה: ' + e.message, '#ef4444');
  }
}

function showToast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg || '#22c55e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

renderList();
</script>

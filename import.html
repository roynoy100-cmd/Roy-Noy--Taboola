window.addEventListener("DOMContentLoaded", () => {
  const urgCount = {גבוה:0,בינוני:0,נמוך:0};
  DEFECTS.forEach(d => urgCount[d.urgency]++);
  document.getElementById("statTotal").textContent = DEFECTS.length;
  document.getElementById("statHigh").textContent  = urgCount["גבוה"];
  document.getElementById("statMid").textContent   = urgCount["בינוני"];
  document.getElementById("statLow").textContent   = urgCount["נמוך"];
  const tbody = document.getElementById("tbody");
  DEFECTS.forEach((d,i) => {
    const cls = d.urgency==="גבוה"?"badge-high":d.urgency==="בינוני"?"badge-mid":"badge-low";
    const tr = document.createElement("tr");
    tr.innerHTML = `<td style="color:#94a3b8;font-size:11px">${i+1}</td><td style="font-family:monospace;font-size:12px;white-space:nowrap">${d.id}</td><td>${d.area}</td><td>${d.room}</td><td style="max-width:300px;font-size:12px;line-height:1.5">${d.desc}</td><td style="font-size:12px">${d.category}</td><td><span class="badge ${cls}">${d.urgency}</span></td>`;
    tbody.appendChild(tr);
  });
});

function importToApp() {
  try {
    const existing = JSON.parse(localStorage.getItem("pl_d") || "[]");
    const existingIds = new Set(existing.map(d => d.id));
    const newItems = DEFECTS.filter(d => !existingIds.has(d.id));
    if (!newItems.length) { showMsg("⚠️ כל הליקויים כבר קיימים", "err"); return; }
    localStorage.setItem("pl_d", JSON.stringify([...existing, ...newItems]));
    showMsg(`✅ יובאו ${newItems.length} ליקויים! סה״כ: ${existing.length + newItems.length}`, "ok");
  } catch(e) { showMsg("❌ שגיאה: " + e.message, "err"); }
}
function downloadJSON() {
  const blob = new Blob([JSON.stringify(DEFECTS,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="taboola_floor31_Q31.json";a.click();
}
function showMsg(text,type){const el=document.getElementById("msg");el.textContent=text;el.className="msg "+type;el.style.display="block";setTimeout(()=>el.style.display="none",7000);}
